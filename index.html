<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mrasor Platform – Shpronesimi 1978-2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1f5e7a;
            --primary-light: #2c7da0;
            --accent-green: #1e7145;
            --accent-orange: #d68b2c;
            --bg: #eef2f7;
            --surface: #ffffff;
            --danger: #c73e1d;
            --radius-xl: 60px;
            --radius-lg: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e2b3c 0%, #0f1a24 100%);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-card {
            background: var(--surface); border-radius: 32px; padding: 40px 32px;
            width: 440px; max-width: 94vw; text-align: center; animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-card h2 { color: #1e2b3c; margin-bottom: 4px; }
        .login-card input {
            width: 100%; padding: 14px 18px; margin-bottom: 14px;
            border: 2px solid #e2e8f0; border-radius: var(--radius-xl);
            background: #f8fafc;
        }
        .login-buttons { display: flex; gap: 12px; margin-top: 6px; }
        .login-btn {
            flex: 1; background: var(--primary-light); color: white; border: none;
            padding: 14px; border-radius: var(--radius-xl); font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-btn.viewer-btn { background: #5f7f6e; }
        .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 10px; }
        .app-container { display: none; height: 100vh; flex-direction: column; }
        .top-bar {
            background: var(--surface); padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #dce5ec;
        }
        .logo-area { font-weight: 700; font-size: 1.15rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .stats-badge { display: flex; gap: 16px; background: #f8fafc; padding: 6px 16px; border-radius: var(--radius-xl); }
        .stat-item { font-size: 0.78rem; color: #5a6e7c; }
        .stat-value { font-weight: 800; color: var(--primary); margin-left: 5px; }
        .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .search-wrapper { position: relative; }
        .search-input {
            padding: 8px 14px 8px 34px; border: 2px solid #e2e8f0;
            border-radius: var(--radius-xl); font-size: 0.85rem; width: 180px;
            background: #f8fafc;
        }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .btn-icon {
            background: #f1f5f9; border: none; font-size: 0.82rem; cursor: pointer;
            padding: 8px 14px; border-radius: var(--radius-xl); font-weight: 500;
            display: inline-flex; align-items: center; gap: 6px; color: #475569;
        }
        .btn-icon:hover { background: #e2e8f0; }
        .btn-excel { background: var(--accent-green); color: white; }
        .btn-add { background: var(--primary-light); color: white; }
        .btn-upload { background: var(--accent-orange); color: white; }
        .btn-logout { background: #fee2e2; color: #991b1b; }
        .btn-backup { background: #6b5b95; color: white; }
        .table-wrapper { flex: 1; padding: 12px 16px; overflow: auto; background: #f9fbfd; }
        #excel-grid { border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,0.08); background: white; }
        .tabulator { font-size: 0.84rem !important; }
        .tabulator .tabulator-header { background: #f1f5f9 !important; }
        .tabulator-row:hover { background: #f0f9ff !important; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .toast-msg {
            background: var(--primary-light); color: white; padding: 12px 20px;
            border-radius: var(--radius-xl); font-size: 0.85rem;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08); animation: fadeIn 0.3s;
            display: flex; align-items: center; gap: 8px; margin-top: 8px;
        }
        .toast-msg.error { background: var(--danger); }
        .toast-msg.success { background: var(--accent-green); }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1500; display: flex; align-items: center; justify-content: center;
        }
        .modal-dialog { background: white; border-radius: 28px; padding: 28px; max-width: 420px; text-align: center; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .modal-btn { padding: 10px 22px; border-radius: 60px; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn.confirm { background: var(--danger); color: white; }
        .modal-btn.cancel { background: #e2e8f0; color: #475569; }
        footer { font-size: 0.7rem; text-align: center; padding: 7px; color: #7b8c9b; background: #f8fafc; border-top: 1px solid #edf2f7; }
        @media (max-width: 900px) { .stats-badge { display: none; } .btn-icon span { display: none; } }
    </style>
</head>
<body>

<div id="loginScreen" class="login-overlay">
    <div class="login-card">
        <i class="fas fa-landmark" style="font-size: 52px; color: #2c7da0;"></i>
        <h2>Mrasor · Kadastër</h2>
        <p class="subtitle">Shpronesimi 1978 → 2026</p>
        <input type="text" id="loginUsername" placeholder="Emri përdorues" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Fjalëkalimi (për admin)">
        <div class="login-buttons">
            <button class="login-btn" id="adminLoginBtn"><i class="fas fa-user-shield"></i> Admin Login</button>
            <button class="login-btn viewer-btn" id="viewerLoginBtn"><i class="fas fa-eye"></i> Viewer (shiko)</button>
        </div>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="appContainer" class="app-container">
    <div class="top-bar">
        <div class="logo-area"><i class="fas fa-map-marked-alt"></i> MRASOR · Shpronësimi 1978-2026</div>
        <div class="stats-badge">
            <div class="stat-item">📦 Parcela: <span id="totalParcels" class="stat-value">0</span></div>
            <div class="stat-item">📐 Shpronesuar: <span id="totalExp" class="stat-value">0 m²</span></div>
            <div class="stat-item">🗺️ Sip.2026: <span id="totalArea2026" class="stat-value">0 m²</span></div>
            <div class="stat-item">👥 Pronarë: <span id="uniqueOwners" class="stat-value">0</span></div>
        </div>
        <div class="toolbar">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="globalSearch" placeholder="Kërko...">
            </div>
            <button id="importExcelBtn" class="btn-icon btn-upload" style="display:none;"><i class="fas fa-upload"></i> <span>Importo Excel</span></button>
            <button id="exportExcelBtn" class="btn-icon btn-excel" style="display:none;"><i class="fas fa-file-excel"></i> <span>Eksporto</span></button>
            <button id="backupBtn" class="btn-icon btn-backup" style="display:none;"><i class="fas fa-download"></i> <span>Backup</span></button>
            <button id="addNewRowBtn" class="btn-icon btn-add" style="display:none;"><i class="fas fa-plus"></i> <span>Shto</span></button>
            <button id="logoutBtn" class="btn-icon btn-logout"><i class="fas fa-sign-out-alt"></i> <span>Dil</span></button>
        </div>
    </div>
    <div class="table-wrapper">
        <div id="excel-grid"></div>
    </div>
    <footer>📂 Admin: Importo Excel-in e ri (me parcela të reja) dhe të dhënat përditësohen për të gjithë | ✎ Kliko qelizën për edit</footer>
</div>

<div class="toast-container" id="toastContainer"></div>
<input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" style="display:none;">
<input type="file" id="restoreInput" accept=".json" style="display:none;">

<script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

<script>
(function() {
    // ==================== TË DHËNAT FILLESTARE (SHEMBULL) ====================
    const sampleParcels = [
        { numri_rendor:1, zona_kadastrale:"Mrasor", nr_parceles_1978:"258-0", nr_parceles_2026:"258-1", siperfaqja_1978:8777, siperfaqja_shpronesuar:860, siperfaqja_2026:1252, pronari:"Tahir Ali Mrasoraj", dokumenti:"Lenda Tahir Ali Mrasoraj Nr.148-78 ZK Mrasor KK Rahovec.pdf", burimi_dokumentit:"Komuna e Rahovecit-Drejtoria për Gjeodezi,Kadastër dhe Pronë", komente:"Parcela e ndare ne 4 pjese" },
        { numri_rendor:2, zona_kadastrale:"Mrasor", nr_parceles_1978:"260-0", nr_parceles_2026:"260-1", siperfaqja_1978:3635, siperfaqja_shpronesuar:104, siperfaqja_2026:1280, pronari:"Tahir Ali Mrasoraj", dokumenti:"Lenda Tahir Ali Mrasoraj Nr.148-78 ZK Mrasor KK Rahovec.pdf", burimi_dokumentit:"Komuna e Rahovecit-Drejtoria për Gjeodezi,Kadastër dhe Pronë", komente:"Nga linjat e shpronesimit parcela 260-1 siperfaqe 104 m2" },
        { numri_rendor:3, zona_kadastrale:"Mrasor", nr_parceles_1978:"260-0", nr_parceles_2026:"260-2", siperfaqja_1978:3635, siperfaqja_shpronesuar:818, siperfaqja_2026:1113, pronari:"Tahir Ali Mrasoraj", dokumenti:"Lenda Tahir Ali Mrasoraj Nr.148-78 ZK Mrasor KK Rahovec.pdf", burimi_dokumentit:"Komuna e Rahovecit-Drejtoria për Gjeodezi,Kadastër dhe Pronë", komente:"Ndarje e re nga parcela origjinale 260-0" }
    ];

    const db = new Dexie("MrasorDB");
    db.version(1).stores({ parcels: "++id, numri_rendor, zona_kadastrale, nr_parceles_1978, nr_parceles_2026, pronari" });

    let currentTable = null, currentRole = null;
    const $ = sel => document.querySelector(sel);

    function showMessage(text, type = 'info') {
        const container = $('#toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast-msg ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${text}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showConfirm(title, message) {
        return new Promise(resolve => {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal-dialog"><h3>${title}</h3><p>${message}</p><div class="modal-buttons"><button class="modal-btn cancel" id="modalCancel">Jo</button><button class="modal-btn confirm" id="modalConfirm">Po</button></div></div>`;
            document.body.appendChild(overlay);
            const close = result => { overlay.remove(); resolve(result); };
            overlay.querySelector('#modalConfirm').onclick = () => close(true);
            overlay.querySelector('#modalCancel').onclick = () => close(false);
        });
    }

    async function updateStats() {
        const all = await db.parcels.toArray();
        $('#totalParcels').innerText = all.length;
        const totalExp = all.reduce((s, p) => s + (Number(p.siperfaqja_shpronesuar) || 0), 0);
        const totalArea = all.reduce((s, p) => s + (Number(p.siperfaqja_2026) || 0), 0);
        $('#totalExp').innerHTML = totalExp.toLocaleString('sq-AL') + " m²";
        $('#totalArea2026').innerHTML = totalArea.toLocaleString('sq-AL') + " m²";
        $('#uniqueOwners').innerText = new Set(all.map(p => p.pronari?.trim()).filter(Boolean)).size;
    }

    async function loadAndRefresh() {
        const data = await db.parcels.toArray();
        if (currentTable) currentTable.setData(data);
        await updateStats();
    }

    async function renumberAllParcels(silent = false) {
        let all = await db.parcels.toArray();
        all.sort((a,b) => (a.numri_rendor || 0) - (b.numri_rendor || 0));
        let needsUpdate = false;
        const updated = all.map((item, i) => {
            if (item.numri_rendor !== i+1) {
                item.numri_rendor = i+1;
                needsUpdate = true;
            }
            return item;
        });
        if (needsUpdate) {
            await db.parcels.bulkPut(updated);
            if (currentTable) currentTable.setData(updated);
            if (!silent) showMessage("Numrat rendor u rregulluan!", "success");
        }
        await updateStats();
    }

    async function seedInitialData() {
        const count = await db.parcels.count();
        if (count === 0) {
            await db.parcels.bulkAdd(sampleParcels);
            await renumberAllParcels(true);
            showMessage("Të dhënat fillestare u ngarkuan. Importo Excel-in tënd për të gjitha parcelat.", "success");
        }
        await loadAndRefresh();
    }

    // ==================== IMPORT EXCEL ====================
    async function importExcel(file) {
        if (!file) return;
        try {
            showMessage("Duke lexuar Excel-in...", "info");
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet);

            if (!rows || rows.length === 0) {
                showMessage("Excel-i është bosh!", "error");
                return;
            }

            const newParcels = rows.map((row, idx) => {
                // Kërko numrin rendor në kolona të ndryshme
                let nr = row["Numri rendor"] || row["numri rendor"] || row["Numri Rendor"] || row["NR"] || idx + 1;
                return {
                    numri_rendor: parseInt(nr) || idx + 1,
                    zona_kadastrale: row["Zona Kadastrale"] || row["zona kadastrale"] || "Mrasor",
                    nr_parceles_1978: row["Nr parceles 1978"] || row["nr parceles 1978"] || "",
                    nr_parceles_2026: row["Nr parceles 2026"] || row["nr parceles 2026"] || "",
                    siperfaqja_1978: parseFloat(row["Siperfaqja 1978 (m2)"] || row["siperfaqja 1978 (m2)"] || 0),
                    siperfaqja_shpronesuar: parseFloat(row["Siperfaqja e shpronesuar (m2)"] || row["siperfaqja e shpronesuar (m2)"] || 0),
                    siperfaqja_2026: parseFloat(row["Siperfaqja 2026 (m2)"] || row["siperfaqja 2026 (m2)"] || 0),
                    pronari: row["Pronari"] || row["pronari"] || "",
                    dokumenti: row["Dokumenti"] || row["dokumenti"] || "",
                    burimi_dokumentit: row["Burimi i Dokumentit"] || row["burimi i dokumentit"] || "Komuna e Rahovecit-Drejtoria për Gjeodezi,Kadastër dhe Pronë",
                    komente: row["Komente"] || row["komente"] || ""
                };
            });

            if (newParcels.length === 0) throw new Error("Nuk u gjetën parcela");

            await db.parcels.clear();
            await db.parcels.bulkAdd(newParcels);
            await renumberAllParcels(true);
            await loadAndRefresh();

            showMessage(`Importi u krye! ${newParcels.length} parcela të ngarkuara.`, "success");
        } catch (err) {
            console.error("Import error:", err);
            showMessage("Gabim gjatë importit të Excel-it.", "error");
        }
    }

    function triggerImport() {
        $('#excelFileInput').click();
    }

    function getColumns(role) {
        const cols = [
            { title: "Nr.Rendor", field: "numri_rendor", width: 85, editor: role === 'admin' ? "number" : false, headerSort: true },
            { title: "Zona Kad.", field: "zona_kadastrale", width: 95, editor: role === 'admin' ? "input" : false },
            { title: "Nr 1978", field: "nr_parceles_1978", width: 100, editor: role === 'admin' ? "input" : false },
            { title: "Nr 2026", field: "nr_parceles_2026", width: 100, editor: role === 'admin' ? "input" : false },
            { title: "Siperf 1978 (m²)", field: "siperfaqja_1978", width: 120, hozAlign: "right", editor: role === 'admin' ? "number" : false, formatter: "money", formatterParams: { precision: 2 } },
            { title: "Shpronesuar (m²)", field: "siperfaqja_shpronesuar", width: 130, hozAlign: "right", editor: role === 'admin' ? "number" : false, formatter: "money", formatterParams: { precision: 2 } },
            { title: "Siperf 2026 (m²)", field: "siperfaqja_2026", width: 120, hozAlign: "right", editor: role === 'admin' ? "number" : false, formatter: "money", formatterParams: { precision: 2 } },
            { title: "Pronari", field: "pronari", width: 200, editor: role === 'admin' ? "input" : false },
            { title: "Dokumenti", field: "dokumenti", width: 220, editor: role === 'admin' ? "textarea" : false, formatter: "textarea" },
            { title: "Burimi", field: "burimi_dokumentit", width: 180, editor: role === 'admin' ? "input" : false },
            { title: "Komente", field: "komente", width: 250, editor: role === 'admin' ? "textarea" : false, formatter: "textarea" }
        ];
        if (role === 'admin') {
            cols.push({ title: "Fshij", field: "delete", formatter: "buttonCross", width: 55, cellClick: async (e, cell) => {
                const row = cell.getRow().getData();
                if (await showConfirm("Fshije parcelën?", `A jeni i sigurt që doni të fshini parcelën me Nr. ${row.numri_rendor}?`)) {
                    await db.parcels.delete(row.id);
                    await renumberAllParcels(true);
                    await loadAndRefresh();
                    showMessage("Parcela u fshi!", "success");
                }
            }});
        }
        return cols;
    }

    async function initGrid(role) {
        if (currentTable) currentTable.destroy();
        currentTable = new Tabulator("#excel-grid", {
            data: await db.parcels.toArray(),
            layout: "fitColumns",
            pagination: "local",
            paginationSize: 25,
            paginationSizeSelector: [15, 25, 50, 100],
            movableColumns: true,
            columns: getColumns(role),
            placeholder: "Nuk ka të dhëna. Importo Excel-in për të filluar."
        });
        if (role === 'admin') {
            currentTable.on("cellEdited", async cell => {
                const data = cell.getRow().getData();
                if (data.id) { await db.parcels.update(data.id, data); showMessage("Ndryshimi u ruajt", "success"); await updateStats(); }
            });
        }
        $('#globalSearch').oninput = () => {
            const term = $('#globalSearch').value.toLowerCase();
            currentTable.setFilter(data => Object.values(data).some(v => String(v ?? '').toLowerCase().includes(term)));
        };
        await updateStats();
    }

    async function addNewParcel() {
        const all = await db.parcels.toArray();
        const maxNum = all.length ? Math.max(...all.map(p => p.numri_rendor || 0)) : 0;
        await db.parcels.add({
            numri_rendor: maxNum + 1, zona_kadastrale: "Mrasor", nr_parceles_1978: "", nr_parceles_2026: "",
            siperfaqja_1978: 0, siperfaqja_shpronesuar: 0, siperfaqja_2026: 0,
            pronari: "", dokumenti: "", burimi_dokumentit: "Komuna e Rahovecit-Drejtoria për Gjeodezi,Kadastër dhe Pronë", komente: ""
        });
        await renumberAllParcels(true);
        await loadAndRefresh();
        showMessage("Parcelë e re u shtua!", "success");
    }

    async function exportToExcel() {
        const data = await db.parcels.toArray();
        const wsData = data.map(p => ({
            "Numri rendor": p.numri_rendor, "Zona Kadastrale": p.zona_kadastrale,
            "Nr parceles 1978": p.nr_parceles_1978, "Nr parceles 2026": p.nr_parceles_2026,
            "Siperfaqja 1978 (m2)": p.siperfaqja_1978, "Siperfaqja e shpronesuar (m2)": p.siperfaqja_shpronesuar,
            "Siperfaqja 2026 (m2)": p.siperfaqja_2026, "Pronari": p.pronari,
            "Dokumenti": p.dokumenti, "Burimi i Dokumentit": p.burimi_dokumentit, "Komente": p.komente
        }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wsData), "Shpronesimi");
        XLSX.writeFile(wb, `Mrasor_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
        showMessage("Eksporti Excel u krye!", "success");
    }

    async function backupToJson() {
        const data = await db.parcels.toArray();
        const backup = { version: "1.0", exportedAt: new Date().toISOString(), totalRecords: data.length, data: data.map(({ id, ...rest }) => rest) };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
        link.download = `Mrasor_Backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        link.click(); URL.revokeObjectURL(link.href);
        showMessage("Backup u ruajt!", "success");
    }

    async function restoreFromJson(file) {
        if (!file) return;
        const text = await file.text();
        const backup = JSON.parse(text);
        if (!backup.data) throw new Error("Format i pavlefshëm");
        if (!await showConfirm("Rikthimi nga backup", `Rikthe ${backup.data.length} parcela? Të dhënat aktuale do të zëvendësohen.`)) return;
        await db.parcels.clear();
        await db.parcels.bulkAdd(backup.data.map((item, i) => ({ ...item, numri_rendor: i + 1 })));
        await loadAndRefresh();
        showMessage(`Rikthimi u krye! ${backup.data.length} parcela.`, "success");
    }

    async function setupApp(role) {
        currentRole = role;
        await seedInitialData();
        await initGrid(role);
        const isAdmin = role === 'admin';
        const btns = ['importExcelBtn', 'exportExcelBtn', 'backupBtn', 'addNewRowBtn'];
        btns.forEach(id => { const btn = $(`#${id}`); if (btn) btn.style.display = isAdmin ? 'inline-flex' : 'none'; });
        if (isAdmin) {
            $('#importExcelBtn').onclick = triggerImport;
            $('#exportExcelBtn').onclick = exportToExcel;
            $('#backupBtn').onclick = backupToJson;
            $('#addNewRowBtn').onclick = addNewParcel;
        }
        $('#logoutBtn').onclick = async () => {
            if (await showConfirm("Dilni?", "A doni të dilni?")) {
                $('#loginScreen').style.display = 'flex';
                $('#appContainer').style.display = 'none';
                if (currentTable) currentTable.destroy();
                currentTable = null;
                currentRole = null;
            }
        };
        $('#appContainer').style.display = 'flex';
    }

    function adminLogin() {
        if ($('#loginPassword').value === "news2026") {
            $('#loginError').innerText = '';
            $('#loginScreen').style.display = 'none';
            setupApp('admin');
        } else {
            $('#loginError').innerText = "Fjalëkalimi i pasaktë!";
            $('#loginPassword').value = '';
        }
    }
    function viewerLogin() {
        $('#loginError').innerText = '';
        $('#loginScreen').style.display = 'none';
        setupApp('viewer');
    }

    $('#adminLoginBtn').onclick = adminLogin;
    $('#viewerLoginBtn').onclick = viewerLogin;
    $('#loginPassword').addEventListener('keypress', e => { if (e.key === 'Enter') adminLogin(); });
    $('#excelFileInput').addEventListener('change', e => { if (e.target.files[0]) importExcel(e.target.files[0]); e.target.value = ''; });
    $('#restoreInput').addEventListener('change', e => { if (e.target.files[0]) restoreFromJson(e.target.files[0]); e.target.value = ''; });
    document.addEventListener('keydown', e => {
        if (!currentRole) return;
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (currentRole === 'admin') exportToExcel(); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); $('#globalSearch').focus(); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); if (currentRole === 'admin') addNewParcel(); }
    });
    $('#loginUsername').focus();
})();
</script>
</body>
</html>
